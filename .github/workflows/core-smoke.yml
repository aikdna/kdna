name: core-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# PR-1: enforce that @aikdna/kdna-core can be required without throwing and
# that its public exports (especially STANDARD_ENTRIES) are intact. Catches
# regressions like the missing-STANDARD_ENTRIES and JSON_ENTRY_RE bugs.
jobs:
  smoke:
    name: core-smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-activation-server
          ref: 6e203a78c038f15c0e65f19b9aa22a6f642478cb
          path: .ecosystem-repos/kdna-activation-server
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-assets
          ref: 8656656f845adf8f5711114c5fa2fa9ecff05806
          path: .ecosystem-repos/kdna-assets
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-cli
          ref: 0a23a2528bd55ee99a4d3a9ed488793973096fd4
          path: .ecosystem-repos/kdna-cli
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/create-kdna-web-app
          ref: 4241dc20814bae4fcf72d44df7c0670ef70bda00
          path: .ecosystem-repos/create-kdna-web-app
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-demo-web-viewer
          ref: a7d4df05973d472ec24ba060f3d9c02c0d22c6f3
          path: .ecosystem-repos/kdna-demo-web-viewer
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-react
          ref: 3edcdce0f75b6dfb1eb4147cedaf24f8af6574a3
          path: .ecosystem-repos/kdna-react
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-remote-server
          ref: eb677ea0fece9b0886724df8383563253ec45600
          path: .ecosystem-repos/kdna-remote-server
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-skills
          ref: c9ac7de534b7ba810217d1d15b14a23a6e5b845f
          path: .ecosystem-repos/kdna-skills
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-core-swift
          ref: f866025d386b45bfe94fb39adcf6c09438629d42
          path: .ecosystem-repos/kdna-core-swift
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-app-shared
          ref: 3f999a6e8d7015ef024beea044584eb2eac50d90
          path: .ecosystem-repos/kdna-app-shared
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-studio-swift
          ref: 638bd845ff265f0488b7bfccb745f608b23ead88
          path: .ecosystem-repos/kdna-studio-swift
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-vscode
          ref: c0d885ba8222b6dccad87ec67f7d82fcc1283107
          path: .ecosystem-repos/kdna-vscode
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-studio-cli
          ref: 543e651d95a3679f3938dcaa67672572150456d1
          path: .ecosystem-repos/kdna-studio-cli
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-studio-core
          ref: aea2d9c035643b60f26e4e855a295c48305524a9
          path: .ecosystem-repos/kdna-studio-core
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-web-client
          ref: d128ac815fc82d0249b7f49793a1a0103949c4ee
          path: .ecosystem-repos/kdna-web-client
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-web-server
          ref: 9fc1377bfb378d5977ab77dcdc30ee4f0b2a181d
          path: .ecosystem-repos/kdna-web-server
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'
      - name: Select the outside-repository trusted npm release
        run: |
          echo "KDNA_TRUSTED_NPM_TARBALL=$RUNNER_TEMP/npm-11.17.0.tgz" >> "$GITHUB_ENV"
      - name: Fetch and authenticate the audited npm release bytes
        run: >-
          node scripts/core-release-authority.js provision-npm
          --artifact "$RUNNER_TEMP/npm-11.17.0.tgz"
      - name: Verify the isolated npm CLI and extraction boundary
        run: node scripts/core-release-authority.js verify-npm
      - name: Install workspace deps
        run: node scripts/core-release-authority.js trusted-npm ci --ignore-scripts
      - name: Install fixed Python test dependency
        run: python -m pip install --disable-pip-version-check --no-input pytest==9.1.0
      - name: Run core-smoke
        run: node scripts/core-release-authority.js trusted-npm run test:core-smoke
      - name: Run full kdna-core test suite
        run: >-
          node scripts/core-release-authority.js trusted-npm
          --workspace @aikdna/kdna-core test
      - name: Run kdna-eval test suite
        run: >-
          node scripts/core-release-authority.js trusted-npm
          --workspace @aikdna/kdna-eval test
      - name: Cross-repo ecosystem-version-lock (PR-8)
        env:
          KDNA_REPOS_ROOT: ${{ github.workspace }}/.ecosystem-repos
          KDNA_CONTROL_ROOT: ${{ github.workspace }}
        run: >-
          node scripts/core-release-authority.js trusted-npm
          run test:ecosystem-lock
      - name: Verify Python adapter against the exact current CLI
        env:
          KDNA_CLI: ${{ github.workspace }}/node_modules/.bin/kdna
          PYTHONPATH: ${{ github.workspace }}/python-sdk
        run: python -m pytest python-sdk/tests -q
      - name: Rehearse the complete compatibility ecosystem gate
        env:
          KDNA_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: node scripts/core-release-authority.js trusted-npm run ecosystem-gate
      - name: Remove the trusted npm release bytes
        if: always()
        run: rm -f "$KDNA_TRUSTED_NPM_TARBALL"
