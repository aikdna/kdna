name: core-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# PR-1: enforce that @aikdna/kdna-core can be required without throwing and
# that its public exports (especially STANDARD_ENTRIES) are intact. Catches
# regressions like the missing-STANDARD_ENTRIES and JSON_ENTRY_RE bugs.
jobs:
  smoke:
    name: core-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'
      - name: Install workspace deps
        run: npm ci
      - name: Run core-smoke
        run: npm run test:core-smoke
      - name: Run full kdna-core test suite
        run: npm --workspace @aikdna/kdna-core test
      - name: Run kdna-eval test suite
        run: npm --workspace @aikdna/kdna-eval test
      - name: Cross-repo ecosystem-version-lock (PR-8)
        env:
          KDNA_REPOS_ROOT: ${{ github.workspace }}/..
        run: npm run test:ecosystem-lock
