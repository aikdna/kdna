name: KDNA Eval

on:
  push:
    branches: [main]
    paths: ['examples/**', 'packages/**', 'schema/**']
  pull_request:
    branches: [main]
    paths: ['examples/**', 'packages/**', 'schema/**']

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22' }

      - run: npm install

      - name: Lint examples
        run: npm run lint:examples

      - name: Validate schemas
        run: npm run validate:examples

      - name: Run unit tests
        run: npm test

      - name: Verify installed domains
        run: |
          npm install -g @aikdna/kdna-cli
          kdna install writing --yes
          kdna verify @aikdna/writing --trust
          kdna list
