name: KDNA Eval

on:
  push:
    branches: [main]
    paths: ['.github/workflows/eval.yml', 'conformance/**', 'examples/**', 'packages/**', 'schema/**', 'scripts/**']
  pull_request:
    branches: [main]
    paths: ['.github/workflows/eval.yml', 'conformance/**', 'examples/**', 'packages/**', 'schema/**', 'scripts/**']

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with: { node-version: '22' }

      - run: npm ci

      - name: Run deterministic protocol preflight
        run: npm run release:preflight
