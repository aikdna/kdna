name: Validate KDNA Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npx eslint packages/kdna-core/src/
      - run: npm run format:check
      - run: npm run lint:examples

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run validate:examples

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
      - run: npm run conformance

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - name: Validate runtime contract examples
        run: npm run validate:runtime-contract
      - name: Validate app runtime schema examples
        run: npm run validate:app-schemas
      - name: Validate protocol fixtures
        run: npm run validate:protocol-fixtures

  sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Build @kdna/artifact-engine
        run: npm run build --workspace=@kdna/artifact-engine
      - name: Test @kdna/artifact-engine
        run: npm test --workspace=@kdna/artifact-engine
      - name: Build @kdna/fidelity-core
        run: npm run build --workspace=@kdna/fidelity-core
      - name: Test @kdna/fidelity-core
        run: npm test --workspace=@kdna/fidelity-core
