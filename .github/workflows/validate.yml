name: Validate KDNA Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npx eslint packages/kdna-core/src/
      - run: npm run format:check
      - run: npm run lint:examples

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run validate:examples

  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
      - run: npm run conformance
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
      - run: npm run conformance:phase2
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - name: Validate runtime contract examples
        run: npm run validate:runtime-contract
      - name: Validate app runtime schema examples
        run: npm run validate:app-schemas
      - name: Validate protocol fixtures
        run: npm run validate:protocol-fixtures

  sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Build @aikdna/kdna-artifact-engine
        run: npm run build --workspace=@aikdna/kdna-artifact-engine
      - name: Test @aikdna/kdna-artifact-engine
        run: npm test --workspace=@aikdna/kdna-artifact-engine
      - name: Build @aikdna/kdna-fidelity-core
        run: npm run build --workspace=@aikdna/kdna-fidelity-core
      - name: Test @aikdna/kdna-fidelity-core
        run: npm test --workspace=@aikdna/kdna-fidelity-core
