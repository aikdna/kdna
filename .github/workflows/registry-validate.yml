name: Legacy fixture validate (registry/domains.json)

on:
  pull_request:
    paths: ['registry/domains.json']
  push:
    branches: [main]
    paths: ['registry/domains.json', 'schema/kdna-manifest-v1rc.json', 'scripts/validate-protocol-fixtures.js']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22' }

      - run: npm ci
      - run: npm run validate:protocol-fixtures
