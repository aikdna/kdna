name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-core:
    if: startsWith(github.ref_name, 'kdna-core-v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # all tags needed for release:check (prepublishOnly)
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-cli
          ref: a44a26c0bdfe0eb5ff21ecac5ec01baaa7355f26
          path: .ecosystem-repos/kdna-cli
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-skills
          ref: 6a0e087da3f34c6ae3e9adcd8022d43f278ba59a
          path: .ecosystem-repos/kdna-skills
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-studio-core
          ref: 8cfa807bd108260a25aa9ee43b765095d0aaf63a
          path: .ecosystem-repos/kdna-studio-core
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-studio-cli
          ref: 48ffc13451c8afbe0fafa6f21466ab6bdab213fd
          path: .ecosystem-repos/kdna-studio-cli
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-core-swift
          ref: 8dc36bdbc35e3b84161d3a90e32a10d49c6425c1
          path: .ecosystem-repos/kdna-core-swift
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-vscode
          ref: 4791d1a50c75b82e4a6e21ca190c3c0f27e39d84
          path: .ecosystem-repos/kdna-vscode
# kdna-writing, kdna-prompt_diagnosis, kdna-agent_safety repos deleted — artifacts migrated to internal curation (see PRIVATE/STATUS/ for mapping)
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      # ecosystem-gate skipped for kdna-core publish: downstream repos
      # depend on the new kdna-core that hasn't been published yet,
      # so their npm ci would fail with ETARGET (circular dep).
      - run: npm run conformance
      - run: npm run release:evidence -- --package=core
      - uses: actions/upload-artifact@v4
        with:
          name: kdna-core-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/kdna-core
        run: npm publish --provenance --access public
        working-directory: packages/kdna-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-compat:
    if: startsWith(github.ref_name, 'kdna-v')
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-cli
          ref: a44a26c0bdfe0eb5ff21ecac5ec01baaa7355f26
          path: .ecosystem-repos/kdna-cli
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-skills
          ref: 6a0e087da3f34c6ae3e9adcd8022d43f278ba59a
          path: .ecosystem-repos/kdna-skills
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-studio-core
          ref: 8cfa807bd108260a25aa9ee43b765095d0aaf63a
          path: .ecosystem-repos/kdna-studio-core
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-studio-cli
          ref: 48ffc13451c8afbe0fafa6f21466ab6bdab213fd
          path: .ecosystem-repos/kdna-studio-cli
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-core-swift
          ref: 8dc36bdbc35e3b84161d3a90e32a10d49c6425c1
          path: .ecosystem-repos/kdna-core-swift
      - uses: actions/checkout@v6
        with:
          repository: aikdna/kdna-vscode
          ref: 4791d1a50c75b82e4a6e21ca190c3c0f27e39d84
          path: .ecosystem-repos/kdna-vscode
# kdna-writing, kdna-prompt_diagnosis, kdna-agent_safety repos deleted — artifacts migrated to internal curation (see PRIVATE/STATUS/ for mapping)
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run ecosystem-gate
      - run: npm run release:evidence -- --package=compat
      - uses: actions/upload-artifact@v4
        with:
          name: kdna-compat-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/kdna compatibility package
        run: npm publish --provenance --access public
        working-directory: packages/kdna
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-agent:
    if: startsWith(github.ref_name, 'agent-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        working-directory: examples/typescript-agent
      - run: npm test
        working-directory: examples/typescript-agent
      - run: npm run release:evidence -- --package=agent
      - uses: actions/upload-artifact@v4
        with:
          name: kdna-agent-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/agent
        run: npm publish --provenance --access public
        working-directory: examples/typescript-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
