name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-core:
    if: startsWith(github.ref_name, 'kdna-core-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm --workspace @aikdna/kdna-core test
      - run: npm run conformance
      - name: Publish @aikdna/kdna-core
        run: npm publish --provenance --access public
        working-directory: packages/kdna-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-compat:
    if: startsWith(github.ref_name, 'kdna-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm --workspace @aikdna/kdna test
      - name: Publish @aikdna/kdna compatibility package
        run: npm publish --provenance --access public
        working-directory: packages/kdna
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-agent:
    if: startsWith(github.ref_name, 'agent-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        working-directory: examples/typescript-agent
      - run: npm test
        working-directory: examples/typescript-agent
      - name: Publish @aikdna/agent
        run: npm publish --provenance --access public
        working-directory: examples/typescript-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
