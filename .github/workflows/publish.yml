name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-core:
    if: github.event_name == 'release' && github.event.action == 'published' && github.event.release.draft == false && github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'kdna-core-v')
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0  # all tags needed for release:check (prepublishOnly)
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Verify canonical Core release tag
        run: npm --workspace @aikdna/kdna-core run release:check
      # ecosystem-gate skipped for kdna-core publish: downstream repos
      # depend on the new kdna-core that hasn't been published yet,
      # so their npm ci would fail with ETARGET (circular dep).
      - run: npm run conformance
      - run: npm run release:evidence -- --package=core
      - name: Guard duplicate Core publication
        id: core-publish-guard
        run: npm --workspace @aikdna/kdna-core run publish:guard -- --github-output="$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kdna-core-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/kdna-core
        if: steps.core-publish-guard.outputs.publish_required == 'true'
        run: npm publish --provenance --access public
        working-directory: packages/kdna-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-eval:
    if: github.event_name == 'release' && github.event.action == 'published' && github.event.release.draft == false && github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'kdna-eval-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm --workspace @aikdna/kdna-eval test
      - run: npm --workspace @aikdna/kdna-eval run typecheck
      - name: Publish @aikdna/kdna-eval
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@aikdna/kdna-eval@$VERSION" version >/dev/null 2>&1; then
            echo "@aikdna/kdna-eval@$VERSION is already published; skipping."
            exit 0
          fi
          npm publish --provenance --access public
        working-directory: packages/kdna-eval
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-compat:
    if: >-
      github.event_name == 'release' &&
      github.event.action == 'published' &&
      github.event.release.draft == false &&
      github.event.release.prerelease == false &&
      startsWith(github.event.release.tag_name, 'kdna-v')
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_EVENT_ACTION: ${{ github.event.action }}
      RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
      RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-cli
          ref: dcc5f70df4cbb0460ef27222d5c1e6fa3e632888
          path: .ecosystem-repos/kdna-cli
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-skills
          ref: 76ce82a001fc363d93581cd3d0e54c7c31de0c26
          path: .ecosystem-repos/kdna-skills
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-studio-core
          ref: ee65a8896a77c0f2c797a0d85e04be1fc5aacbd6
          path: .ecosystem-repos/kdna-studio-core
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-studio-cli
          ref: 66545bf2b51b93433e5233fed9a5b93c6a366bfe
          path: .ecosystem-repos/kdna-studio-cli
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-core-swift
          ref: b1f7f1a7cba5459413f00ecc0302f71e0d21ef78
          path: .ecosystem-repos/kdna-core-swift
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-vscode
          ref: c0d885ba8222b6dccad87ec67f7d82fcc1283107
          path: .ecosystem-repos/kdna-vscode
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-activation-server
          ref: 9ba3c71b50dc282f24f1fb455a0e79019d36458f
          path: .ecosystem-repos/kdna-activation-server
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-remote-server
          ref: 2e97c860e4eab1797ec19e304fd771b51454009d
          path: .ecosystem-repos/kdna-remote-server
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-web-server
          ref: e99bf65ec95101a2bc9a7bed1e85f597db001486
          path: .ecosystem-repos/kdna-web-server
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-web-client
          ref: ad27c702c29b0780dce89dfa5e3665d69fca179d
          path: .ecosystem-repos/kdna-web-client
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/kdna-react
          ref: b012419be197a5f3ce8d1e4b13cf9552cadef069
          path: .ecosystem-repos/kdna-react
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: aikdna/create-kdna-web-app
          ref: 33b3b4c2b7934eff27f5c4fd3bc30c5498642127
          path: .ecosystem-repos/create-kdna-web-app
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Pin the audited npm release client
        run: |
          npm install --global npm@11.17.0 --ignore-scripts --registry=https://registry.npmjs.org/
          npm --version | grep -Fx 11.17.0
      - run: npm ci --ignore-scripts
      - name: Verify canonical compatibility release tag
        run: npm --workspace @aikdna/kdna run release:check
      - run: npm run ecosystem-gate
      - name: Build independently verified compatibility artifact
        run: >-
          npm --workspace @aikdna/kdna run release:pack --
          --evidence "$RUNNER_TEMP/kdna-compat-release-evidence.json"
          --artifact "$RUNNER_TEMP/kdna-compat-release.tgz"
      - name: Verify exact tarball through a clean registry install
        run: >-
          npm --workspace @aikdna/kdna run release:smoke --
          --artifact "$RUNNER_TEMP/kdna-compat-release.tgz"
      - name: Guard duplicate compatibility publication
        id: registry
        run: >-
          npm --workspace @aikdna/kdna run publish:guard --
          --evidence "$RUNNER_TEMP/kdna-compat-release-evidence.json"
          --artifact "$RUNNER_TEMP/kdna-compat-release.tgz"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kdna-compat-release-evidence
          path: |
            ${{ runner.temp }}/kdna-compat-release-evidence.json
            ${{ runner.temp }}/kdna-compat-release.tgz
      - name: Publish the verified compatibility package
        if: steps.registry.outputs.should_publish == 'true'
        run: >-
          npm --workspace @aikdna/kdna run publish:verified --
          --evidence "$RUNNER_TEMP/kdna-compat-release-evidence.json"
          --artifact "$RUNNER_TEMP/kdna-compat-release.tgz"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Remove transient compatibility artifacts
        if: always()
        run: rm -f "$RUNNER_TEMP/kdna-compat-release-evidence.json" "$RUNNER_TEMP/kdna-compat-release.tgz"

  publish-agent:
    if: github.event_name == 'release' && github.event.action == 'published' && github.event.release.draft == false && github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'agent-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        working-directory: examples/typescript-agent
      - run: npm test
        working-directory: examples/typescript-agent
      - run: npm run release:evidence -- --package=agent
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kdna-agent-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/agent
        run: npm publish --provenance --access public
        working-directory: examples/typescript-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
