name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-core:
    if: startsWith(github.ref_name, 'kdna-core-v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # all tags needed for release:check (prepublishOnly)
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-cli
          ref: 135f8840a181234dae1a536f95caf41587e5a789
          path: .ecosystem-repos/kdna-cli
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-skills
          ref: 2bc8d0455b595bf77e970b547e00a481765ed879
          path: .ecosystem-repos/kdna-skills
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-studio-core
          ref: 3d5875c9cc07e496f33389c66cadad51b9c52e64
          path: .ecosystem-repos/kdna-studio-core
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-studio-cli
          ref: dfece1b627fbef52c072902571eaaf955b5232e1
          path: .ecosystem-repos/kdna-studio-cli
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-core-swift
          ref: 904c1d8d5c8008686b283fe921ef15d116f5a9ca
          path: .ecosystem-repos/kdna-core-swift
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-vscode
          ref: c0d885ba8222b6dccad87ec67f7d82fcc1283107
          path: .ecosystem-repos/kdna-vscode
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      # ecosystem-gate skipped for kdna-core publish: downstream repos
      # depend on the new kdna-core that hasn't been published yet,
      # so their npm ci would fail with ETARGET (circular dep).
      - run: npm run conformance
      - run: npm run release:evidence -- --package=core
      - uses: actions/upload-artifact@v4
        with:
          name: kdna-core-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/kdna-core
        run: npm publish --provenance --access public
        working-directory: packages/kdna-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-eval:
    if: startsWith(github.ref_name, 'kdna-eval-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm --workspace @aikdna/kdna-eval test
      - run: npm --workspace @aikdna/kdna-eval run typecheck
      - name: Publish @aikdna/kdna-eval
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@aikdna/kdna-eval@$VERSION" version >/dev/null 2>&1; then
            echo "@aikdna/kdna-eval@$VERSION is already published; skipping."
            exit 0
          fi
          npm publish --provenance --access public
        working-directory: packages/kdna-eval
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-compat:
    if: startsWith(github.ref_name, 'kdna-v')
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-cli
          ref: 135f8840a181234dae1a536f95caf41587e5a789
          path: .ecosystem-repos/kdna-cli
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-skills
          ref: 2bc8d0455b595bf77e970b547e00a481765ed879
          path: .ecosystem-repos/kdna-skills
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-studio-core
          ref: 3d5875c9cc07e496f33389c66cadad51b9c52e64
          path: .ecosystem-repos/kdna-studio-core
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-studio-cli
          ref: dfece1b627fbef52c072902571eaaf955b5232e1
          path: .ecosystem-repos/kdna-studio-cli
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-core-swift
          ref: 904c1d8d5c8008686b283fe921ef15d116f5a9ca
          path: .ecosystem-repos/kdna-core-swift
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-vscode
          ref: c0d885ba8222b6dccad87ec67f7d82fcc1283107
          path: .ecosystem-repos/kdna-vscode
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run ecosystem-gate
      - run: npm run release:evidence -- --package=compat
      - uses: actions/upload-artifact@v4
        with:
          name: kdna-compat-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/kdna compatibility package
        run: npm publish --provenance --access public
        working-directory: packages/kdna
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-agent:
    if: startsWith(github.ref_name, 'agent-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        working-directory: examples/typescript-agent
      - run: npm test
        working-directory: examples/typescript-agent
      - run: npm run release:evidence -- --package=agent
      - uses: actions/upload-artifact@v4
        with:
          name: kdna-agent-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/agent
        run: npm publish --provenance --access public
        working-directory: examples/typescript-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
