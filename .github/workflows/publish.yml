name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-core:
    if: >-
      github.repository == 'aikdna/kdna' &&
      github.event_name == 'release' &&
      github.event.action == 'published' &&
      github.event.release.draft == false &&
      github.event.release.prerelease == false &&
      !startsWith(github.event.release.tag_name, 'v') &&
      !contains(github.event.release.tag_name, '/')
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_EVENT_ACTION: ${{ github.event.action }}
      RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
      RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Select the outside-repository trusted npm release
        run: |
          echo "KDNA_TRUSTED_NPM_TARBALL=$RUNNER_TEMP/npm-11.17.0.tgz" >> "$GITHUB_ENV"
      - name: Fetch and authenticate the audited npm release bytes
        run: >-
          node scripts/core-release-authority.js provision-npm
          --artifact "$RUNNER_TEMP/npm-11.17.0.tgz"
      - name: Verify the isolated npm CLI and extraction boundary
        run: node scripts/core-release-authority.js verify-npm
      - run: node scripts/core-release-authority.js trusted-npm ci --ignore-scripts
      - name: Verify exact natural SemVer tag and authoritative source
        run: node scripts/core-release-authority.js check
      - name: Test Core and hostile release policy
        run: |
          node scripts/core-release-authority.js trusted-npm --workspace @aikdna/kdna-core test
          node --test scripts/core-release-authority.test.js
      - name: Validate authoritative Runtime manifest fixtures
        run: node scripts/core-release-authority.js trusted-npm run validate:protocol-fixtures
      - name: Validate published Runtime contract surfaces
        run: node scripts/core-release-authority.js trusted-npm run validate:runtime-contract
      - run: node scripts/core-release-authority.js trusted-npm run conformance
      - name: Select outside-repository release outputs
        run: |
          CORE_VERSION=$(node -p "require('./packages/kdna-core/package.json').version")
          echo "CORE_RELEASE_EVIDENCE=$RUNNER_TEMP/kdna-core-release-evidence.json" >> "$GITHUB_ENV"
          echo "CORE_RELEASE_ARTIFACT=$RUNNER_TEMP/aikdna-kdna-core-$CORE_VERSION.tgz" >> "$GITHUB_ENV"
      - name: Build two exact-commit packs and retain the verified first artifact
        run: >-
          node scripts/core-release-authority.js prepare
          --evidence "$CORE_RELEASE_EVIDENCE"
          --artifact "$CORE_RELEASE_ARTIFACT"
      - name: Verify the retained artifact through a clean install
        run: >-
          node scripts/core-release-authority.js smoke
          --evidence "$CORE_RELEASE_EVIDENCE"
          --artifact "$CORE_RELEASE_ARTIFACT"
      - name: Guard duplicate Core publication
        id: registry
        run: >-
          node scripts/core-release-authority.js guard
          --evidence "$CORE_RELEASE_EVIDENCE"
          --artifact "$CORE_RELEASE_ARTIFACT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kdna-core-release-evidence
          path: |
            ${{ env.CORE_RELEASE_EVIDENCE }}
            ${{ env.CORE_RELEASE_ARTIFACT }}
      - name: Publish the rebound retained Core artifact
        if: steps.registry.outputs.should_publish == 'true'
        run: >-
          node scripts/core-release-authority.js publish
          --evidence "$CORE_RELEASE_EVIDENCE"
          --artifact "$CORE_RELEASE_ARTIFACT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Remove transient Core release outputs
        if: always()
        run: >-
          rm -f "$CORE_RELEASE_EVIDENCE" "$CORE_RELEASE_ARTIFACT"
          "$KDNA_TRUSTED_NPM_TARBALL"

  publish-eval:
    if: github.event_name == 'release' && github.event.action == 'published' && github.event.release.draft == false && github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'eval/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_EVENT_ACTION: ${{ github.event.action }}
      RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
      RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Verify exact eval tag and source commit
        run: npm --workspace @aikdna/kdna-eval run release:check
      - run: npm --workspace @aikdna/kdna-eval test
      - run: npm --workspace @aikdna/kdna-eval run typecheck
      - name: Build and retain the exact Eval package artifact
        run: npm run release:evidence -- --package=eval
      - name: Verify eval release evidence
        run: npm --workspace @aikdna/kdna-eval run release:evidence:check
      - name: Select the verified Eval artifact
        run: |
          ARTIFACT_PATH=$(node -p "require('./release-evidence/artifact-manifest.json').artifacts[0].artifact_path")
          echo "EVAL_RELEASE_ARTIFACT=$ARTIFACT_PATH" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kdna-eval-release-evidence
          path: release-evidence/
      - name: Publish @aikdna/kdna-eval
        run: |
          VERSION=$(node -p "require('./packages/kdna-eval/package.json').version")
          if npm view "@aikdna/kdna-eval@$VERSION" version >/dev/null 2>&1; then
            echo "@aikdna/kdna-eval@$VERSION is already published; skipping."
            exit 0
          fi
          npm publish "./$EVAL_RELEASE_ARTIFACT" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-compat:
    if: >-
      github.repository == 'aikdna/kdna' &&
      github.event_name == 'release' &&
      github.event.action == 'published' &&
      github.event.release.draft == false &&
      github.event.release.prerelease == false &&
      startsWith(github.event.release.tag_name, 'compat/')
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_EVENT_ACTION: ${{ github.event.action }}
      RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
      RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-cli
          ref: 0a23a2528bd55ee99a4d3a9ed488793973096fd4
          path: .ecosystem-repos/kdna-cli
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-skills
          ref: c9ac7de534b7ba810217d1d15b14a23a6e5b845f
          path: .ecosystem-repos/kdna-skills
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-studio-core
          ref: aea2d9c035643b60f26e4e855a295c48305524a9
          path: .ecosystem-repos/kdna-studio-core
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-studio-cli
          ref: 543e651d95a3679f3938dcaa67672572150456d1
          path: .ecosystem-repos/kdna-studio-cli
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-core-swift
          ref: f866025d386b45bfe94fb39adcf6c09438629d42
          path: .ecosystem-repos/kdna-core-swift
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-app-shared
          ref: 3f999a6e8d7015ef024beea044584eb2eac50d90
          path: .ecosystem-repos/kdna-app-shared
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-studio-swift
          ref: 638bd845ff265f0488b7bfccb745f608b23ead88
          path: .ecosystem-repos/kdna-studio-swift
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-vscode
          ref: c0d885ba8222b6dccad87ec67f7d82fcc1283107
          path: .ecosystem-repos/kdna-vscode
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-activation-server
          ref: 6e203a78c038f15c0e65f19b9aa22a6f642478cb
          path: .ecosystem-repos/kdna-activation-server
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-remote-server
          ref: eb677ea0fece9b0886724df8383563253ec45600
          path: .ecosystem-repos/kdna-remote-server
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-web-server
          ref: 9fc1377bfb378d5977ab77dcdc30ee4f0b2a181d
          path: .ecosystem-repos/kdna-web-server
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-web-client
          ref: d128ac815fc82d0249b7f49793a1a0103949c4ee
          path: .ecosystem-repos/kdna-web-client
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-react
          ref: 3edcdce0f75b6dfb1eb4147cedaf24f8af6574a3
          path: .ecosystem-repos/kdna-react
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/create-kdna-web-app
          ref: 4241dc20814bae4fcf72d44df7c0670ef70bda00
          path: .ecosystem-repos/create-kdna-web-app
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-assets
          ref: 8656656f845adf8f5711114c5fa2fa9ecff05806
          path: .ecosystem-repos/kdna-assets
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-demo-web-viewer
          ref: a7d4df05973d472ec24ba060f3d9c02c0d22c6f3
          path: .ecosystem-repos/kdna-demo-web-viewer
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'
      - name: Select the outside-repository trusted npm release
        run: |
          echo "KDNA_TRUSTED_NPM_TARBALL=$RUNNER_TEMP/npm-11.17.0.tgz" >> "$GITHUB_ENV"
      - name: Fetch and authenticate the audited npm release bytes
        run: >-
          node scripts/core-release-authority.js provision-npm
          --artifact "$RUNNER_TEMP/npm-11.17.0.tgz"
      - name: Verify the isolated npm CLI and extraction boundary
        run: node scripts/core-release-authority.js verify-npm
      - run: node scripts/core-release-authority.js trusted-npm ci --ignore-scripts
      - name: Install fixed Python test dependency
        run: python -m pip install --disable-pip-version-check --no-input pytest==9.1.0
      - name: Fetch protected main for release ancestry verification
        run: git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
      - name: Verify canonical compatibility release tag
        run: >-
          node scripts/core-release-authority.js trusted-npm
          --workspace @aikdna/kdna run release:check
      - name: Verify all expected ecosystem dependency bindings
        env:
          KDNA_REPOS_ROOT: ${{ github.workspace }}/.ecosystem-repos
          KDNA_CONTROL_ROOT: ${{ github.workspace }}
          KDNA_CORE_BASELINE: '0.21.0'
          KDNA_STUDIO_CORE_BASELINE: '3.0.0'
        run: >-
          node scripts/core-release-authority.js trusted-npm
          run test:ecosystem-lock
      - name: Run the complete ecosystem gate
        env:
          KDNA_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: node scripts/core-release-authority.js trusted-npm run ecosystem-gate
      - name: Build independently verified compatibility artifact
        run: >-
          node scripts/core-release-authority.js trusted-npm
          --workspace @aikdna/kdna run release:pack --
          --evidence "$RUNNER_TEMP/kdna-compat-release-evidence.json"
          --artifact "$RUNNER_TEMP/kdna-compat-release.tgz"
      - name: Verify exact tarball through a clean registry install
        run: >-
          node scripts/core-release-authority.js trusted-npm
          --workspace @aikdna/kdna run release:smoke --
          --artifact "$RUNNER_TEMP/kdna-compat-release.tgz"
      - name: Guard duplicate compatibility publication
        id: registry
        run: >-
          node scripts/core-release-authority.js trusted-npm
          --workspace @aikdna/kdna run publish:guard --
          --evidence "$RUNNER_TEMP/kdna-compat-release-evidence.json"
          --artifact "$RUNNER_TEMP/kdna-compat-release.tgz"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kdna-compat-release-evidence
          path: |
            ${{ runner.temp }}/kdna-compat-release-evidence.json
            ${{ runner.temp }}/kdna-compat-release.tgz
      - name: Publish the verified compatibility package
        if: steps.registry.outputs.should_publish == 'true'
        run: >-
          node scripts/core-release-authority.js trusted-npm-auth
          --workspace @aikdna/kdna run publish:verified --
          --evidence "$RUNNER_TEMP/kdna-compat-release-evidence.json"
          --artifact "$RUNNER_TEMP/kdna-compat-release.tgz"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Remove transient compatibility artifacts
        if: always()
        run: >-
          rm -f "$RUNNER_TEMP/kdna-compat-release-evidence.json"
          "$RUNNER_TEMP/kdna-compat-release.tgz"
          "$KDNA_TRUSTED_NPM_TARBALL"
